<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DREAM2MOON · Tournament Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap');

  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#090b10;--panel:#0f1219;--border:#1e2535;
    --gold:#f5c542;--gold2:#e0a020;
    --green:#00e676;--red:#ff4444;--blue:#4fc3f7;
    --text:#e8eaf0;--muted:#5a6270;
    --a-col:#4fc3f7;--b-col:#ff6b6b;--c-col:#a8ff78;--d-col:#f5c542;
  }
  body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;min-height:100vh;}

  /* ── LOGIN ── */
  #loginWrap{
    display:flex;align-items:center;justify-content:center;min-height:100vh;
    background:radial-gradient(ellipse at 50% 30%,#0d1a2e 0%,#090b10 70%);
  }
  .loginBox{
    background:var(--panel);border:1px solid var(--border);border-radius:16px;
    padding:40px 36px;width:360px;text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.6);
  }
  .loginBox .logo{font-size:28px;font-weight:900;letter-spacing:3px;color:var(--gold);margin-bottom:4px;}
  .loginBox .sub{font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:30px;}
  .loginBox input{
    width:100%;background:#111827;border:1px solid var(--border);border-radius:8px;
    padding:12px 14px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:15px;
    margin-bottom:12px;outline:none;transition:border .2s;
  }
  .loginBox input:focus{border-color:var(--gold);}
  .loginBox button{
    width:100%;background:var(--gold);color:#000;border:none;border-radius:8px;
    padding:13px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;
    letter-spacing:2px;cursor:pointer;transition:opacity .2s;
  }
  .loginBox button:hover{opacity:.85;}
  #loginErr{color:var(--red);font-size:12px;margin-top:10px;display:none;}

  /* ── APP ── */
  #app{display:none;}
  header{
    background:var(--panel);border-bottom:1px solid var(--border);
    padding:14px 24px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:100;
  }
  header .brand{font-size:20px;font-weight:900;letter-spacing:3px;color:var(--gold);}
  header .brand span{color:var(--muted);font-size:12px;font-weight:400;margin-left:8px;letter-spacing:1px;}
  .topBtns{display:flex;gap:8px;}
  .topBtns button{
    background:transparent;border:1px solid var(--border);color:var(--muted);
    border-radius:6px;padding:6px 14px;font-family:'Barlow Condensed',sans-serif;
    font-size:13px;cursor:pointer;transition:all .2s;
  }
  .topBtns button:hover,.topBtns button.active{border-color:var(--gold);color:var(--gold);}
  #logoutBtn{border-color:#ff444430!important;color:var(--red)!important;}
  #logoutBtn:hover{background:#ff444415!important;}

  main{padding:24px;max-width:1100px;margin:0 auto;}

  /* ── TABS ── */
  .tabBar{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0;}
  .tab{
    padding:10px 20px;cursor:pointer;font-size:14px;font-weight:700;letter-spacing:1px;
    color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;
  }
  .tab.active{color:var(--gold);border-bottom-color:var(--gold);}
  .tabPane{display:none;} .tabPane.active{display:block;}

  /* ── CARDS ── */
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
  .cardTitle{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:16px;text-transform:uppercase;}

  /* ── FORM ── */
  .formRow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .formRow.full{grid-template-columns:1fr;}
  label{font-size:11px;color:var(--muted);letter-spacing:1px;display:block;margin-bottom:4px;}
  input[type=text],input[type=password],select,textarea{
    width:100%;background:#111827;border:1px solid var(--border);border-radius:8px;
    padding:10px 12px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:14px;
    outline:none;transition:border .2s;
  }
  input[type=text]:focus,select:focus,textarea:focus{border-color:var(--gold);}
  textarea{resize:vertical;min-height:80px;}
  .btn{
    background:var(--gold);color:#000;border:none;border-radius:8px;
    padding:10px 20px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900;
    letter-spacing:1px;cursor:pointer;transition:opacity .2s;
  }
  .btn:hover{opacity:.85;}
  .btn.outline{background:transparent;color:var(--gold);border:1px solid var(--gold);}
  .btn.danger{background:transparent;color:var(--red);border:1px solid #ff444440;}
  .btn.danger:hover{background:#ff444415;}
  .btn.sm{padding:6px 12px;font-size:12px;}

  /* ── TEAMS LIST ── */
  .teamRow{
    display:grid;grid-template-columns:24px 1fr 1fr 1fr auto;
    align-items:center;gap:10px;
    padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;
  }
  .teamRow:last-child{border-bottom:none;}
  .teamRow .num{color:var(--muted);font-size:11px;}
  .teamRow .leader{font-weight:700;color:var(--text);}
  .teamRow .members{color:var(--muted);font-size:11px;}
  .teamRow .grpBadge{
    font-size:10px;font-weight:900;padding:2px 8px;border-radius:4px;
    text-align:center;
  }

  /* ── SLIDES PREVIEW ── */
  #slidesOut{margin-top:16px;}
  .slideWrap{margin-bottom:24px;}
  .slideWrap h3{font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:8px;}

  /* ── SLIDE CARD ── */
  .slide{
    font-family:'Barlow Condensed',sans-serif;
    border-radius:14px;overflow:hidden;
    box-shadow:0 8px 32px rgba(0,0,0,.7);
    max-width:680px;
  }
  .slide-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;}
  .slide-header .group-badge{
    width:38px;height:38px;border-radius:8px;background:rgba(0,0,0,.35);
    display:flex;align-items:center;justify-content:center;
    font-size:20px;font-weight:900;color:#fff;
  }
  .slide-header .group-info{margin-left:12px;flex:1;}
  .slide-header .group-name{font-size:15px;font-weight:900;letter-spacing:3px;color:#fff;}
  .slide-header .group-meta{font-size:10px;color:rgba(255,255,255,.7);letter-spacing:1px;margin-top:1px;}
  .slide-header .game-badge{
    background:rgba(0,0,0,.35);border-radius:6px;padding:5px 14px;
    font-size:11px;font-weight:900;letter-spacing:2px;color:#fff;
  }
  .slide-subbar{
    background:#111;padding:6px 18px;border-bottom:1px solid rgba(255,255,255,.05);
    display:flex;justify-content:space-between;align-items:center;
  }
  .slide-subbar span{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:1px;}
  .slide-thead{
    display:grid;padding:6px 12px;
    font-size:9px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,.3);
  }
  .slide-row{
    display:grid;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04);
    align-items:center;
  }
  .slide-row:last-child{border-bottom:none;}
  .slide-row .rank{font-size:11px;color:rgba(255,255,255,.3);}
  .slide-row .lname{font-size:13px;font-weight:700;color:#fff;}
  .slide-row .mems{font-size:10px;color:rgba(255,255,255,.4);}
  .qualify-badge{
    font-size:9px;font-weight:900;padding:3px 8px;border-radius:4px;color:#000;
    white-space:nowrap;
  }
  .dash-badge{font-size:11px;color:rgba(255,255,255,.2);}

  /* GRAND FINAL SLIDE */
  .gf-row{
    display:grid;grid-template-columns:32px 1fr 1fr 60px;
    padding:7px 14px;border-bottom:1px solid rgba(255,255,255,.04);
    align-items:center;font-size:12px;
  }
  .gf-row:last-child{border-bottom:none;}
  .gf-slot{font-size:10px;font-weight:900;padding:2px 6px;border-radius:4px;color:#000;text-align:center;}
  .prize-bar{
    display:grid;grid-template-columns:1fr 1fr 1fr;
    border-top:1px solid rgba(255,255,255,.08);
  }
  .prize-cell{padding:14px;text-align:center;border-right:1px solid rgba(255,255,255,.06);}
  .prize-cell:last-child{border-right:none;}
  .prize-icon{font-size:22px;margin-bottom:4px;}
  .prize-amt{font-size:18px;font-weight:900;color:var(--gold);}
  .prize-lbl{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:1px;margin-top:2px;}
  .esewa-bar{
    background:#1a1f15;padding:8px 14px;display:flex;align-items:center;justify-content:center;
    gap:6px;font-size:10px;color:#4caf50;letter-spacing:1px;font-weight:700;
  }

  .snap-btn{
    margin-top:8px;
    background:transparent;border:1px solid var(--border);color:var(--muted);
    border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer;
    font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;
    transition:all .2s;
  }
  .snap-btn:hover{border-color:var(--gold);color:var(--gold);}

  .toast{
    position:fixed;bottom:24px;right:24px;z-index:9999;
    background:#1e2535;border:1px solid var(--border);color:var(--text);
    padding:10px 18px;border-radius:8px;font-size:13px;font-weight:700;
    opacity:0;transition:opacity .3s;pointer-events:none;
    box-shadow:0 8px 24px rgba(0,0,0,.5);
  }
  .toast.show{opacity:1;}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
  .stat .val{font-size:28px;font-weight:900;color:var(--gold);}
  .stat .lbl{font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:2px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="loginBox">
    <div class="logo">DREAM2MOON</div>
    <div class="sub">TOURNAMENT ADMIN PANEL</div>
    <input type="text" id="uInput" placeholder="Username" autocomplete="off">
    <input type="password" id="pInput" placeholder="Password">
    <button id="loginBtn">LOGIN →</button>
    <div id="loginErr">❌ Invalid credentials</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="brand">DREAM2MOON <span>TOURNAMENT PANEL</span></div>
    <div class="topBtns">
      <button class="tab-nav active" data-tab="dashboard">DASHBOARD</button>
      <button class="tab-nav" data-tab="teams">TEAMS</button>
      <button class="tab-nav" data-tab="slides">SLIDES</button>
      <button id="logoutBtn">LOGOUT</button>
    </div>
  </header>
  <main>

    <!-- DASHBOARD -->
    <div id="tab-dashboard" class="tabPane active">
      <div class="stats" id="statsRow"></div>
      <div class="card">
        <div class="cardTitle">Quick Add Team</div>
        <div class="formRow">
          <div><label>LEADER NAME</label><input type="text" id="ql" placeholder="e.g. ROGX-SABIN"></div>
          <div><label>GROUP</label>
            <select id="qg">
              <option value="A">Group A</option>
              <option value="B">Group B</option>
              <option value="C">Group C</option>
              <option value="D">Group D</option>
            </select>
          </div>
        </div>
        <div class="formRow">
          <div><label>MEMBER 1</label><input type="text" id="qm1" placeholder="Member 1"></div>
          <div><label>MEMBER 2</label><input type="text" id="qm2" placeholder="Member 2"></div>
        </div>
        <div class="formRow">
          <div><label>MEMBER 3</label><input type="text" id="qm3" placeholder="Member 3"></div>
          <div><label>MEMBER 4 (optional)</label><input type="text" id="qm4" placeholder="Member 4"></div>
        </div>
        <button class="btn" onclick="quickAdd()">+ ADD TEAM</button>
      </div>
    </div>

    <!-- TEAMS -->
    <div id="tab-teams" class="tabPane">
      <div class="card">
        <div class="cardTitle" style="display:flex;justify-content:space-between;align-items:center;">
          <span>ALL TEAMS</span>
          <button class="btn sm outline" onclick="clearAll()">CLEAR ALL</button>
        </div>
        <div id="teamsList"></div>
      </div>
    </div>

    <!-- SLIDES -->
    <div id="tab-slides" class="tabPane">
      <div class="card">
        <div class="cardTitle">SLIDE SETTINGS</div>
        <div class="formRow">
          <div><label>EVENT DATE</label><input type="text" id="evDate" value="29 May 2026"></div>
          <div><label>QUALIFY COUNT RULE</label>
            <select id="qualifyRule">
              <option value="auto">AUTO (≤8 squads = TOP 2, else TOP 3)</option>
              <option value="3">Always TOP 3</option>
              <option value="2">Always TOP 2</option>
            </select>
          </div>
        </div>
        <div class="formRow">
          <div><label>PRIZE 1ST</label><input type="text" id="p1" value="Rs.1,200"></div>
          <div><label>PRIZE 2ND</label><input type="text" id="p2" value="Rs.800"></div>
        </div>
        <div class="formRow">
          <div><label>PRIZE 3RD</label><input type="text" id="p3" value="Rs.400"></div>
          <div><label>PAYMENT METHOD</label><input type="text" id="payMethod" value="via eSewa"></div>
        </div>
        <button class="btn" onclick="generateSlides()">⚡ GENERATE SLIDES</button>
      </div>
      <div id="slidesOut"></div>
    </div>

  </main>
</div>

<div class="toast" id="toast"></div>

// AUTH

const CREDS = { user: 'Dream2moon', pass: 'dream2moon@123' };

document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('pInput').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('uInput').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('pInput').focus(); });

function doLogin() {
  const u = document.getElementById('uInput').value.trim();
  const p = document.getElementById('pInput').value;
  const err = document.getElementById('loginErr');
  if (u === CREDS.user && p === CREDS.pass) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    err.style.display = 'none';
    initApp();
  } else {
    err.style.display = 'block';
    document.getElementById('pInput').value = '';
    document.getElementById('pInput').focus();
  }
}

document.getElementById('logoutBtn').addEventListener('click', () => {
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('uInput').value = '';
  document.getElementById('pInput').value = '';
});

const GRP_LABELS = ['A','B','C','D'];

function getQualifyCount(groupSize) {
  const rule = (document.getElementById('qualifyRule') || {}).value || 'auto';
  if (rule === '3') return 3;
  if (rule === '2') return 2;
  // auto: ≤8 squads = top 2, else top 3

// ═══════════════════════════════════════
// INIT / STATS
// ═══════════════════════════════════════
function initApp() {
  renderStats();
  renderTeams();
}

function renderStats() {
  const grps = GRP_LABELS.map(g => teams.filter(t => t.g === g));
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="val">${teams.length}</div><div class="lbl">TOTAL SQUADS</div></div>
    <div class="stat"><div class="val">${grps.filter(g=>g.length>0).length}</div><div class="lbl">ACTIVE GROUPS</div></div>
    <div class="stat"><div class="val">${grps.reduce((s,g)=>{ const q=getQualifyCount(g.length); return s+Math.min(q,g.length); },0)}</div><div class="lbl">QUALIFYING SPOTS</div></div>
    <div class="stat"><div class="val">5</div><div class="lbl">TOTAL GAMES</div></div>
  `;
}

// ═══════════════════════════════════════
// TEAMS
// ═══════════════════════════════════════
function renderTeams() {
  const el = document.getElementById('teamsList');
  if (!teams.length) { el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);">No teams yet.</div>'; return; }
  el.innerHTML = teams.map((t,i) => {
    const col = GROUP_COLORS[t.g] || '#888';
    return `<div class="teamRow">
      <span class="num">${i+1}</span>
      <span class="leader">${esc(t.l)}</span>
      <span class="members">${t.m.map(esc).join(' · ')}</span>
      <span class="grpBadge" style="background:${col}20;color:${col};">GRP ${t.g}</span>
      <button class="btn sm danger" onclick="removeTeam(${i})">✕</button>
    </div>`;
  }).join('');
}

function quickAdd() {
  const l = document.getElementById('ql').value.trim();
  const g = document.getElementById('qg').value;
  const m1 = document.getElementById('qm1').value.trim();
  const m2 = document.getElementById('qm2').value.trim();
  const m3 = document.getElementById('qm3').value.trim();
  const m4 = document.getElementById('qm4').value.trim();
  if (!l || !m1 || !m2 || !m3) { showToast('❌ Leader + 3 members required','err'); return; }
  const members = [m1,m2,m3];
  if (m4) members.push(m4);
  teams.push({g,l,m:members});
  ['ql','qm1','qm2','qm3','qm4'].forEach(id => document.getElementById(id).value='');
  showToast('✅ Team added to Group ' + g);
  renderStats();
}

function removeTeam(i) {
  if (!confirm('Remove "' + teams[i].l + '"?')) return;
  teams.splice(i,1);
  renderTeams();
  renderStats();
}

function clearAll() {
  if (!confirm('Clear ALL teams? This cannot be undone!')) return;
  teams = [];
  renderTeams();
  renderStats();
}

// ═══════════════════════════════════════
// SLIDES GENERATOR
// ═══════════════════════════════════════
function generateSlides() {
  const date = document.getElementById('evDate').value || '29 May 2026';
  const out = document.getElementById('slidesOut');
  out.innerHTML = '';

  const groups = GRP_LABELS.map(g => ({ label:g, teams:teams.filter(t=>t.g===g), color:GROUP_COLORS[g] }))
                            .filter(g => g.teams.length > 0);

  if (!groups.length) { out.innerHTML='<div style="color:var(--muted);padding:16px;">No teams to show.</div>'; return; }

  let allQualifiers = [];
  let gameNum = 1;

  groups.forEach((grp, gi) => {
    const qCount = getQualifyCount(grp.teams.length);
    const slideHtml = buildGroupSlide(grp, qCount, gameNum++, date);
    const wrap = document.createElement('div');
    wrap.className = 'slideWrap';
    wrap.innerHTML = `<h3>SLIDE ${gi+1} — GROUP ${grp.label} (${grp.teams.length} SQUADS · TOP ${qCount} QUALIFY)</h3>`;
    const slideEl = document.createElement('div');
    slideEl.innerHTML = slideHtml;
    wrap.appendChild(slideEl);
    const snapBtn = document.createElement('button');
    snapBtn.className = 'snap-btn';
    snapBtn.textContent = '📸 SCREENSHOT THIS SLIDE';
    snapBtn.onclick = () => snapSlide(slideEl.firstChild, 'GROUP_' + grp.label);
    wrap.appendChild(snapBtn);
    out.appendChild(wrap);

    // collect qualifiers
    grp.teams.slice(0, qCount).forEach((t, qi) => {
      allQualifiers.push({ slot: grp.label+(qi+1), leader:t.l, members:t.m, from:'Group '+grp.label, color:grp.color });
    });
  });

  // Grand Final Slide
  const gfWrap = document.createElement('div');
  gfWrap.className = 'slideWrap';
  gfWrap.innerHTML = `<h3>SLIDE ${groups.length+1} — GRAND FINAL (${allQualifiers.length} TEAMS)</h3>`;
  const gfEl = document.createElement('div');
  gfEl.innerHTML = buildGrandFinalSlide(allQualifiers, gameNum, date);
  gfWrap.appendChild(gfEl);
  const gfSnap = document.createElement('button');
  gfSnap.className = 'snap-btn';
  gfSnap.textContent = '📸 SCREENSHOT THIS SLIDE';
  gfSnap.onclick = () => snapSlide(gfEl.firstChild, 'GRAND_FINAL');
  gfWrap.appendChild(gfSnap);
  out.appendChild(gfWrap);

  showToast('✅ ' + (groups.length+1) + ' slides generated!');
}

function buildGroupSlide(grp, qCount, gameNum, date) {
  const col = grp.color;
  const rows = grp.teams.map((t,i) => {
    const qualified = i < qCount;
    return `
      <div class="slide-row" style="grid-template-columns:28px 1fr 1fr 90px;background:${qualified?'rgba(255,255,255,.03)':'transparent'};">
        <span class="rank">${i+1}</span>
        <span class="lname">${esc(t.l)}</span>
        <span class="mems">${t.m.map(esc).join(' · ')}</span>
        <span style="text-align:right;">
          ${qualified
            ? `<span class="qualify-badge" style="background:${col};">QUALIFY ${qCount}</span>`
            : `<span class="dash-badge">–</span>`}
        </span>
      </div>`;
  }).join('');

  return `<div class="slide" style="background:#0d0d0d;border:1px solid ${col}30;">
    <div class="slide-header" style="background:${col};">
      <div class="slide-header group-badge">${grp.label}</div>
      <div class="slide-header group-info">
        <div class="group-name">GROUP ${grp.label}</div>
        <div class="group-meta">${grp.teams.length} SQUADS &nbsp;·&nbsp; TOP ${qCount} QUALIFY</div>
      </div>
      <div class="slide-header game-badge">GAME ${gameNum}</div>
    </div>
    <div class="slide-subbar">
      <span>DREAM2MOON · FULL MAP · FREE FIRE</span>
      <span>${esc(date)}</span>
    </div>
    <div class="slide-thead" style="grid-template-columns:28px 1fr 1fr 90px;background:rgba(255,255,255,.03);">
      <span>#</span><span>LEADER</span><span>MEMBERS</span><span style="text-align:right;">STATUS</span>
    </div>
    ${rows}
  </div>`;
}

function buildGrandFinalSlide(qualifiers, gameNum, date) {
  const p1 = document.getElementById('p1').value || 'Rs.1,200';
  const p2 = document.getElementById('p2').value || 'Rs.800';
  const p3 = document.getElementById('p3').value || 'Rs.400';
  const pay = document.getElementById('payMethod').value || 'via eSewa';

  const rows = qualifiers.map(q => `
    <div class="gf-row">
      <span class="gf-slot" style="background:${q.color};">${esc(q.slot)}</span>
      <span style="font-size:12px;font-weight:700;color:#fff;">${esc(q.leader)}</span>
      <span style="font-size:10px;color:rgba(255,255,255,.4);">${q.members.map(esc).join(' · ')}</span>
      <span style="font-size:9px;color:rgba(255,255,255,.3);">${esc(q.from)}</span>
    </div>`).join('');

  return `<div class="slide" style="background:#0d0d0d;border:1px solid #f5c54230;">
    <div class="slide-header" style="background:linear-gradient(135deg,#b8960c,#f5c542);">
      <div class="slide-header group-badge">🏆</div>
      <div class="slide-header group-info">
        <div class="group-name">GRAND FINAL</div>
        <div class="group-meta">TOP ${Math.floor(qualifiers.length/4)} FROM EACH GROUP · ${qualifiers.length} TEAMS</div>
      </div>
      <div class="slide-header game-badge">GAME ${gameNum}</div>
    </div>
    <div class="slide-subbar">
      <span>DREAM2MOON · FULL MAP · FREE FIRE</span>
      <span>${esc(date)}</span>
    </div>
    <div class="gf-row" style="background:rgba(255,255,255,.03);font-size:9px;color:rgba(255,255,255,.3);font-weight:700;letter-spacing:1px;">
      <span>GRP</span><span>LEADER</span><span>MEMBERS</span><span>FROM</span>
    </div>
    ${rows}
    <div class="prize-bar">
      <div class="prize-cell">
        <div class="prize-icon">🥇</div>
        <div class="prize-amt">${esc(p1)}</div>
        <div class="prize-lbl">CHAMPION</div>
      </div>
      <div class="prize-cell">
        <div class="prize-icon">🥈</div>
        <div class="prize-amt">${esc(p2)}</div>
        <div class="prize-lbl">2ND PLACE</div>
      </div>
      <div class="prize-cell">
        <div class="prize-icon">🥉</div>
        <div class="prize-amt">${esc(p3)}</div>
        <div class="prize-lbl">3RD PLACE</div>
      </div>
    </div>
    <div class="esewa-bar">💚 ${esc(pay)}</div>
  </div>`;
}

// ═══════════════════════════════════════
// SCREENSHOT
// ═══════════════════════════════════════
async function snapSlide(el, name) {
  try {
    const { default: html2canvas } = await import('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.esm.min.js');
    const canvas = await html2canvas(el, { backgroundColor: null, scale: 2, useCORS: true });
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = 'D2M_' + name + '.png';
    a.click();
    showToast('📸 Screenshot saved!');
  } catch(e) {
    showToast('⚠️ Use browser screenshot (Print Screen / Snipping Tool)', 'err');
  }
}

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = type==='err' ? 'var(--red)' : 'var(--gold)';
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
